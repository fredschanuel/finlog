<!DOCTYPE html>
<html>
<head>
    <title>FinLog</title>
</head>
<body>
    <h1>FinLog</h1>

    <h2>Resumo</h2>
    <p id="balance"></p>

    <button onclick="loadTransactions()">Carregar Transações</button>

    <h2>Paginação</h2>
    <div id="pagination">
        <button id="prevBtn">Anterior</button>
        <input id="pageInput" type="number" min="1" value="1" style="width: 50px;" />
        <input id="pageSizeInput" type="number" min="1" value="10" style="width: 50px;" />
        <button id="goBtn">Ir</button>
        <button id="nextBtn">Próxima</button>
        <span id="pageInfo"></span>
    </div>

    <ul id="list"></ul>

    <script src="app.js"></script>

    <h2>Nova Transação</h2>

    <input id="description" placeholder="Descrição" />
    <input id="amount" type="number" placeholder="Valor" />

    <select id="type">
        <option value="0">Expense</option>
        <option value="1">Income</option>
    </select>

    <button onclick="createTransaction()">Salvar</button>
</body>
</html>
